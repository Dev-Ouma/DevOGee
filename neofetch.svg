  <text x="220" y="231"  font-family="'Courier New', Courier, monospace" font-size="12.5"><tspan fill="#58a6ff">Research:   </tspan><tspan fill="#f0f6fc">STACK · Learning Analytics</tspan></text>
  <text x="220" y="250"  font-family="'Courier New', Courier, monospace" font-size="12.5"><tspan fill="#58a6ff">Published:  </tspan><tspan fill="#febc2e">IEEE · ACM Conference Venues</tspan></text>
  <text x="220" y="269"  font-family="'Courier New', Courier, monospace" font-size="12.5"><tspan fill="#58a6ff">AI/ML:      </tspan><tspan fill="#f0f6fc">IBM AI Practitioner · HCIA-AI</tspan></text>
  <text x="220" y="288"  font-family="'Courier New', Courier, monospace" font-size="12.5"><tspan fill="#58a6ff">Memory:     </tspan><tspan fill="#bc8cff">Infinite Curiosity</tspan></text>
  <text x="220" y="307"  font-family="'Courier New', Courier, monospace" font-size="12.5"><tspan fill="#58a6ff">Uptime:     </tspan><tspan fill="#28c840">Always Learning ∞</tspan></text>

